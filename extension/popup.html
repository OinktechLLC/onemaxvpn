<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; padding: 10px; background: #f8f9fa; }
    .header { text-align: center; margin-bottom: 20px; }
    .connect { background: #34c759; color: white; border: none; padding: 12px 40px; font-size: 18px; border-radius: 30px; cursor: pointer; }
    .toggle { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; margin: 8px 0; border-radius: 12px; }
    .rate { color: #007aff; text-align: right; }
  </style>
</head>
<body>
  <div class="header">
    <h2>One Max VPN</h2>
    <p>Privacy VPN and data saver</p>
    <button id="connect" class="connect">Connect</button>
  </div>

  <div class="toggle">
    <div>Wi-Fi data saving mode</div>
    <label class="switch"><input type="checkbox" id="datasave"><span></span></label>
  </div>

  <div class="toggle">
    <div>Privacy protection</div>
    <label class="switch"><input type="checkbox" id="privacy"><span></span></label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
