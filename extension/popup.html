<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: Arial; background: #f8f9fa; margin: 0; padding: 16px; }
    .header { text-align: center; margin-bottom: 20px; }
    .connect { background: #4CAF50; color: white; border: none; padding: 14px 40px; border-radius: 50px; font-size: 18px; cursor: pointer; width: 100%; }
    .toggle { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 12px; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h2>One Max VPN</h2>
    <p>Privacy VPN and data saver</p>
  </div>
  
  <button class="connect" id="connectBtn">Connect</button>
  
  <div class="toggle">
    <span>Wi-Fi data saving mode</span>
    <label class="switch"><input type="checkbox" id="dataSave"><span class="slider"></span></label>
  </div>
  
  <div class="toggle">
    <span>Privacy protection</span>
    <label class="switch"><input type="checkbox" id="privacy"><span class="slider"></span></label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
