<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 360px; font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #f5f5f5; }
    .header { text-align: center; margin-bottom: 20px; }
    .connect-btn {
      background: #4CAF50; color: white; border: none; padding: 14px 40px;
      font-size: 18px; border-radius: 30px; cursor: pointer; width: 100%;
      margin: 10px 0;
    }
    .toggle { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; margin: 8px 0; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h2>SAMSUNG <strong>Max</strong> VPN</h2>
    <p>Privacy VPN and data saver</p>
  </div>

  <button class="connect-btn" id="connectBtn">Connect</button>

  <div class="toggle">
    <span>Wi-Fi data saving mode</span>
    <label class="switch"><input type="checkbox" id="dataSave"><span class="slider"></span></label>
  </div>

  <div class="toggle">
    <span>Privacy protection</span>
    <label class="switch"><input type="checkbox" id="privacy"><span class="slider"></span></label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
