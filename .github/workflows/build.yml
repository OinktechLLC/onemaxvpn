name: 🤖 One Max VPN — Robot & Build

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'robot/**'
      - 'landing/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ══════════════════════════════════════════════════
  # JOB 1: Поисковой робот — ищет рабочие прокси
  # ══════════════════════════════════════════════════
  robot:
    name: 🔍 Proxy Robot
    runs-on: ubuntu-latest
    outputs:
      server_count: ${{ steps.run.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: robot/requirements.txt

      - name: Install dependencies
        run: pip install -r robot/requirements.txt

      - name: Run proxy robot
        id: run
        run: |
          cd robot
          python fetch_servers.py
          COUNT=$(python3 -c "
          import json, sys
          try:
            d = json.load(open('../landing/servers.json'))
            print(len(d))
          except:
            print(0)
          ")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "✅ Рабочих серверов: $COUNT"

      - name: Fail if too few servers
        run: |
          COUNT="${{ steps.run.outputs.count }}"
          echo "Найдено серверов: $COUNT"
          if [ "$COUNT" -lt 3 ]; then
            echo "❌ Слишком мало серверов: $COUNT"
            exit 1
          fi

      - name: Update update.json
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          REPO="${{ github.repository }}"
          python3 -c "
          import json
          version = '${VERSION}'
          repo    = '${REPO}'
          data = {
            'addons': {
              'one-max-vpn@oinktech.ltd': {
                'updates': [{
                  'version': version,
                  'update_link': f'https://github.com/{repo}/releases/latest/download/one-max-vpn-v{version}.zip'
                }]
              }
            }
          }
          with open('landing/update.json', 'w') as f:
            json.dump(data, f, indent=2)
          print(f'update.json → v{version}')
          "

      - name: Show top 10 servers found
        run: |
          python3 -c "
          import json
          servers = json.load(open('landing/servers.json'))
          print(f'Top 10 of {len(servers)} servers:')
          for s in servers[:10]:
              ping = f\"{s.get('ping', '—')}ms\" if s.get('ping') else '—ms'
              print(f\"  {s.get('flag','🌐')} {s['name']:<22} {s['host']:<18}:{s['port']:<5} {ping}\")
          "

      - name: Commit updated servers
        run: |
          git config user.name  "OneMaxVPN Robot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add landing/servers.json landing/update.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COUNT="${{ steps.run.outputs.count }}"
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "🤖 Robot: ${COUNT} servers on ${DATE} [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

  # ══════════════════════════════════════════════════
  # JOB 2: Сборка расширения в ZIP
  # ══════════════════════════════════════════════════
  build:
    name: 📦 Build Extension
    runs-on: ubuntu-latest
    needs: robot
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Get version
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Validate manifest.json
        run: |
          python3 -c "
          import json, sys
          with open('extension/manifest.json') as f:
            m = json.load(f)
          errors = []
          if m.get('manifest_version') != 3:
            errors.append('manifest_version must be 3')
          if not m.get('version'):
            errors.append('missing version')
          if not m.get('background', {}).get('service_worker'):
            errors.append('missing service_worker')
          if not m.get('action', {}).get('default_popup'):
            errors.append('missing default_popup')
          if errors:
            for e in errors: print('ERROR:', e)
            sys.exit(1)
          print(f\"OK: {m['name']} v{m['version']}\")
          "

      - name: Generate icons
        run: |
          python3 -c "
          import struct, zlib, os
          def make_png(size):
            w = h = size
            def chunk(t, d):
              x = t + d
              return struct.pack('>I', len(d)) + x + struct.pack('>I', zlib.crc32(x) & 0xffffffff)
            rows = []
            for y in range(h):
              row = [0]
              for x in range(w):
                nx = (x/w)*2-1; ny = (y/h)*2-1
                in_shield = abs(nx) < 0.75 - max(0, ny-0.2)*0.6 and ny < 0.9
                in_check = False
                if in_shield:
                  if -0.35 < nx < -0.05 and abs(ny - (nx+0.35)*1.1 + 0.1) < 0.09: in_check = True
                  if -0.05 < nx < 0.38  and abs(ny - (-nx+0.05)*0.75 - 0.28) < 0.09: in_check = True
                if in_shield:
                  f = 1 - abs(ny)*0.15
                  row += [255,255,255] if in_check else [int(52*f), int(199*f), int(89*f)]
                else:
                  row += [0,0,0]
              rows.append(bytes(row))
            idat = zlib.compress(b''.join(rows), 9)
            ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
            def c(t,d): x=t+d; return struct.pack('>I',len(d))+x+struct.pack('>I',zlib.crc32(x)&0xffffffff)
            return b'\x89PNG\r\n\x1a\n' + c(b'IHDR',ihdr) + c(b'IDAT',idat) + c(b'IEND',b'')
          os.makedirs('extension/icons', exist_ok=True)
          for sz in [16, 48, 128]:
            p = f'extension/icons/icon{sz}.png'
            if not os.path.exists(p):
              open(p, 'wb').write(make_png(sz))
              print(f'Created {p}')
            else:
              print(f'OK {p}')
          "

      - name: Build ZIP
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          ZIP="one-max-vpn-v${VERSION}.zip"
          cd extension
          zip -r "../${ZIP}" . \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*" \
            --exclude "*.map" \
            --exclude ".git*"
          cd ..
          echo "ZIP: $ZIP"
          echo "Size: $(du -sh $ZIP | cut -f1)"
          echo "Files:"
          unzip -l "$ZIP" | head -40

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: one-max-vpn-v${{ steps.ver.outputs.version }}.zip
          retention-days: 90

  # ══════════════════════════════════════════════════
  # JOB 3: GitHub Release
  # ══════════════════════════════════════════════════
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [robot, build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Delete old tag if exists
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git push origin ":refs/tags/${TAG}" || true
            echo "Deleted old tag $TAG"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: "🛡️ One Max VPN v${{ needs.build.outputs.version }}"
          body: |
            ## 🛡️ One Max VPN — СБП v${{ needs.build.outputs.version }}

            **Selective Bypass Proxy** — разблокировка YouTube, Telegram, WhatsApp, Claude AI и других сайтов для пользователей из РФ.

            ### 📦 Установка
            1. Скачай ZIP ниже и распакуй
            2. Открой `chrome://extensions`
            3. Включи **«Режим разработчика»**
            4. Нажми **«Загрузить распакованное расширение»**
            5. Выбери папку с распакованными файлами

            ### ✨ Что разблокируется
            YouTube · Telegram · WhatsApp · Claude AI · ChatGPT · Instagram · Discord · Twitter/X · Reddit · TikTok · Spotify · GitHub · LinkedIn · и другие

            ### 🤖 Автообновление серверов
            GitHub Actions robot каждый день в 00:00 UTC находит рабочие прокси и обновляет пул.
            Расширение автоматически подтягивает свежие серверы каждые 24ч.

            **Серверов в пуле:** ${{ needs.robot.outputs.server_count }}
          files: one-max-vpn-v${{ needs.build.outputs.version }}.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════
  # JOB 4: Деплой лендинга на Vercel
  # ══════════════════════════════════════════════════
  deploy:
    name: 🌐 Deploy Vercel
    runs-on: ubuntu-latest
    needs: robot
    if: always() && needs.robot.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest --quiet
          cd landing
          vercel --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true
