name: Build One Max VPN

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Каждый день в 00:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update servers
        run: cd bot && python servers.py

      - name: Create ZIP
        run: |
          cd extension
          zip -r ../one-max-vpn.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: one-max-vpn.zip
          tag_name: v${{ github.run_number }}
