name: One Max VPN CI/CD

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Ежедневно в 00:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update servers
        run: |
          cd bot
          python servers.py

      - name: Build Extension
        run: |
          cd extension
          zip -r ../one-max-vpn.zip ./*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: one-max-vpn.zip

      - name: Deploy Landing (Vercel)
        run: echo "Deploy to Vercel manually or via vercel CLI"